<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Premium</title>
  <link rel="stylesheet" href="style login.css">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  
</head>

<body>
 
  <div class="glass-card text-center">
    <h2 class="mb-2">Connexion</h2>
    <hr>
    <p class="mb-4">Bienvenue. veillez vous connectez a votre compte</p>

    <form action="index.html" method="post">

      <!-- Username -->
      <div class="mb-3 input-group">
        <input type="email" class="form-control" placeholder="vaniablur@gmail.com" required>
      </div>

      <!-- Password -->
      <div class="mb-3 input-group">
        <input type="password" id="password" class="form-control" placeholder="Password" required>
        <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
      </div>

      <!-- Remember -->
      <div class="form-check text-start mb-3">
        <input class="form-check-input" type="checkbox" id="remember">
        <label class="form-check-label" for="remember">
          Se rappeler de moi
        </label>
      </div>

      <button type="submit" class="btn btn-custom w-100 mb-3">Se connecter</button>

      <p>Vous n'avez pas de compte ? <a href="register.html">Inscrivez vous </a></p>

    </form>

    <small class="d-block mt-3">ECO-SNAP</small>
  </div>

  <script>
    const togglePassword = document.querySelector("#togglePassword");
    const password = document.querySelector("#password");

    togglePassword.addEventListener("click", function () {
      const type = password.getAttribute("type") === "password" ? "text" : "password";
      password.setAttribute("type", type);

      this.classList.toggle("bi-eye");
      this.classList.toggle("bi-eye-slash");
    });
  </script>

</body>
</html>
